<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7f1734" />
    <title>MBJP Offline</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 24px); color: #171014; background: radial-gradient(circle at top left, rgba(214, 36, 96, .15), transparent 36%), radial-gradient(circle at bottom right, rgba(15, 138, 95, .16), transparent 34%), linear-gradient(180deg, #fff8f5 0%, #f7efe6 100%); }
      .card { width: min(100%, 460px); border: 1px solid rgba(127,23,52,.13); border-radius: 32px; background: rgba(255,255,255,.92); padding: 28px; box-shadow: 0 24px 80px rgba(127,23,52,.16); }
      .mark { display: inline-grid; place-items: center; width: 64px; height: 64px; border-radius: 20px; background: #fff; color: #7f1734; font-weight: 900; box-shadow: inset 0 0 0 1px rgba(127,23,52,.14); overflow: hidden; }
      .mark img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
      h1 { margin: 22px 0 10px; font-size: clamp(2rem, 10vw, 3.2rem); line-height: .98; letter-spacing: -.055em; }
      p { margin: 0; color: #5c4b52; font-size: 1rem; line-height: 1.75; }
      button { margin-top: 24px; width: 100%; min-height: 52px; border: 0; border-radius: 18px; background: linear-gradient(135deg, #7f1734, #c02664); color: white; font-weight: 900; font-size: 1rem; box-shadow: 0 14px 32px rgba(127,23,52,.22); }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="mark"><img src="/mbjp/logo.png" alt="MBJP" /></div>
      <h1>You are offline</h1>
      <p>MBJP membership, programs, finance and admin data need an internet connection. Please reconnect and try again.</p>
      <button type="button" onclick="location.reload()">Retry connection</button>
    </main>
  </body>
</html>
